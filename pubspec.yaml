name: ai_habit_tracker_app
description: A modern, AI-powered habit tracker built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.8.3
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  shared_preferences: ^2.2.2
  animations: ^2.0.11
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
